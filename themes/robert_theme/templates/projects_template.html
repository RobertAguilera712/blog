{% extends "base.html" %}

{% block body %}

    {% include 'navbar.html' %}

<main class="container d-flex flex-column flex-grow-1 justify-content-center my-5">
    <h1 class="text-center mb-5">Proyectos</h1>
    <div class="row justify-content-center gy-5">
        {% for page in pages %}
        <div class="col-lg-4 col-md-6 d-flex align-items-stretch">
            <section class="card bg-dark mx-auto"
                     data-bs-theme="dark">
                <img src="{{ SITEURL }}/images/{{page.title}}.png"
                     class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title text-center">{{ page.title }}</h5>
                    <p class="card-text">{{ page.summary }}</p>
                </div>
                <div class="card-footer">
                    <a href="{{ SITEURL }}/{{ page.url }}"
                       class="btn btn-danger d-block"
                       rel="noopener"><i class="bi bi-info-circle"></i> Ver más</a>
                </div>
            </section>
        </div>

        {% endfor %}
    </div>
</main>
    

    {% include 'footer.html' %}

{% endblock body %}
